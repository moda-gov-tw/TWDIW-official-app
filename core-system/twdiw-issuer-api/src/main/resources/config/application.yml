# 前端系統相關設定 - Test 環境
dwfront:
  # 前端系統基礎網址，可透過環境變數 DWFRONT_URL 覆寫
  url: ${DWFRONT_URL:https://frontend-uat.wallet.gov.tw}

# IVPAS 驗證服務設定 - Test 環境
ivpas:
  # DID 驗證 API 端點（測試環境）
  verify-did: https://www-uat.wallet.gov.tw/apply/ivpas/api/verifyAccessToken
  # IVPAS 健康檢查 API 端點（測試環境）
  health: https://www-uat.wallet.gov.tw/apply/ivpas/actuator/health

# Apple Store APP公開下載連結 - Test 環境
appleStoreAppUrl: ${APPLE_STORE_APP_URL:https://testflight.apple.com/join/PssjD8qx}

# Google Play APP公開下載連結 - Test 環境
googlePlayAppUrl: ${GOOGLE_PLAY_APP_URL:https://www.wallet.gov.tw/apply/beta_app_download_page.html}