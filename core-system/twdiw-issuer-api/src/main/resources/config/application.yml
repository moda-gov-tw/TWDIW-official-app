# Google Play APP公開下載連結 - Release 環境
googlePlayAppUrl: ${GOOGLE_PLAY_APP_URL:https://play.google.com/store/apps/details?id=tw.gov.moda.diw}

---
# ===================================================================
# Test (UAT) 環境專屬配置
# ===================================================================
