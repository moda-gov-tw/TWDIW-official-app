# ===================================================================
# Spring Boot configuration.
#
# This configuration will be overridden by the Spring profile you use,
# for example application-dev.yml if you use the "dev" profile.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

---
# Conditionally disable springdoc on missing api-docs profile
spring:
  config:
    activate:
      on-profile: '!api-docs'
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  datasource:
    # 資料庫連線類型：使用 HikariCP 連線池
    type: com.zaxxer.hikari.HikariDataSource
    # 資料庫連線 URL（從環境變數讀取）
    # 預設值：jdbc:postgresql://localhost:5432/twdiw_issuer
    url: ${SPRING_DATASOURCE_URL}
    # 資料庫使用者名稱（從環境變數讀取）
    username: ${SPRING_DATASOURCE_USERNAME}
    # 資料庫密碼（從環境變數讀取）
    password: ${SPRING_DATASOURCE_PASSWORD}
    # 資料庫驅動程式類別
    driver-class-name: org.postgresql.Driver
    hikari:
      # 連線池名稱
      poolName: Hikari
      # 關閉自動提交
      auto-commit: false
      # 資料來源屬性
      data-source-properties:
        # 快取預編譯語句
        cachePrepStmts: true
        # 預編譯語句快取大小
        prepStmtCacheSize: 250
        # 預編譯語句 SQL 長度限制
        prepStmtCacheSqlLimit: 2048
        # 使用伺服器端預編譯語句
        useServerPrepStmts: true
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceId: AUTO
          jobStore:
            class: org.quartz.simpl.RAMJobStore
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadsInheritContextClassLoaderOfInitializingThread: true
springdoc:
  api-docs:
    enabled: false
---
management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include:
          - configprops
          - env
          - health
          - info
          - jhimetrics
          - jhiopenapigroups
          - logfile
          - loggers
          - prometheus
          - threaddump
          - liquibase
  endpoint:
    health:
      show-details: when_authorized
      roles: 'ROLE_ADMIN'
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    jhimetrics:
      enabled: true
  info:
    git:
      mode: full
    env:
      enabled: true
  health:
    mail:
      enabled: false # When using the MailService, configure an SMTP server and set this to true
  prometheus:
    metrics:
      export:
        enabled: true
        step: 60
  observations:
    key-values:
      application: ${spring.application.name}
  metrics:
    enable:
      http: true
      jvm: true
      logback: true
      process: true
      system: true
    distribution:
      percentiles-histogram:
        all: true
      percentiles:
        all: 0, 0.5, 0.75, 0.95, 0.99, 1.0
    data:
      repository:
        autotime:
          enabled: true

spring:
  application:
    name: modaDigitalWalletIssuerManagerService
  profiles:
    # The commented value for `active` can be replaced with valid Spring profiles to load.
    # Otherwise, it will be filled in by maven when building the JAR file
    # Either way, it can be overridden by `--spring.profiles.active` value passed in the commandline or `-Dspring.profiles.active` set in `JAVA_OPTS`
    active: '@spring.profiles.active@'
    group:
      dev:
        - release
        - api-docs
        # Uncomment to activate TLS for the dev profile
        #- tls
  jmx:
    enabled: false
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred
  jpa:
    open-in-view: false
    properties:
      hibernate.timezone.default_storage: NORMALIZE
      hibernate.type.preferred_instant_jdbc_type: TIMESTAMP
      hibernate.id.new_generator_mappings: true
      hibernate.connection.provider_disables_autocommit: true
      hibernate.cache.use_second_level_cache: false
      hibernate.cache.use_query_cache: false
      hibernate.generate_statistics: false
      # modify batch size as necessary
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.order_updates: true
      # modify fetch size as necessary
      hibernate.jdbc.fetch_size: 150
      hibernate.criteria.literal_handling_mode: BIND
      hibernate.query.fail_on_pagination_over_collection_fetch: true
      hibernate.query.in_clause_parameter_padding: true
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
  messages:
    basename: i18n/messages
  main:
    allow-bean-definition-overriding: true
  mvc:
    problemdetails:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          authority-prefix: ''
          authorities-claim-name: auth
  task:
    execution:
      thread-name-prefix: twdiw-issuer-server-task-
      pool:
        core-size: 2
        max-size: 50
        queue-capacity: 10000
    scheduling:
      thread-name-prefix: twdiw-issuer-server-scheduling-
      pool:
        size: 2
  thymeleaf:
    mode: HTML
  output:
    ansi:
      console-available: true
  mail:
    # 郵件伺服器主機（從環境變數讀取，避免洩漏內部資訊）
    # 設定方式：export SPRING_MAIL_HOST=your.smtp.server
    host: ${SPRING_MAIL_HOST:localhost}
    # 郵件伺服器埠號（從環境變數讀取）
    # 設定方式：export SPRING_MAIL_PORT=25
    port: ${SPRING_MAIL_PORT:25}
    # 郵件伺服器驗證帳號（從環境變數讀取）
    # 設定方式：export SPRING_MAIL_USERNAME=your.smtp.username
    username: ${SPRING_MAIL_USERNAME:}
    # 郵件伺服器驗證密碼（從環境變數讀取）
    # 設定方式：export SPRING_MAIL_PASSWORD=your.smtp.password
    password: ${SPRING_MAIL_PASSWORD:}
  liquibase:
    enabled: true
    change-log: classpath:config/liquibase/master.xml

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: true
  port: 8080

springdoc:
  show-actuator: true

# Properties to be exposed on the /info management endpoint
info:
  # Comma separated list of profiles that will trigger the ribbon to show
  display-ribbon-on-profiles: 'dev'

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  # CORS is only enabled by default with the "dev" profile
  cors:
    # Allow Ionic for JHipster by default (* no longer allowed in Spring Boot 2.4+)
    allowed-origins: http://${issuer.host.name}/,https://${issuer.host.name}/,http://${issuer.host.name}:80/,https://${issuer.host.name}:80/
    # Enable CORS when running in GitHub Codespaces
    # allowed-origin-patterns: 'https://*.githubpreview.dev'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    # allow-credentials: true
    max-age: 1800
  clientApp:
    name: 'twdiwIssuerServerApp'
  # By default CORS is disabled. Uncomment to enable.
  # cors:
  #   allowed-origins: "http://localhost:8100,http://localhost:9000"
  #   allowed-methods: "*"
  #   allowed-headers: "*"
  #   exposed-headers: "Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params"
  #   allow-credentials: true
  #   max-age: 1800
  mail: # specific JHipster mail property, for standard properties see MailProperties
    from: twdiwIssuerServer@localhost
    base-url: https://${issuer.host.name}/issuermgr
  api-docs:
    default-include-pattern: /api/**
    management-include-pattern: /management/**
    title: Twdiw Issuer Server API
    description: Twdiw Issuer Server API documentation
    version: 0.0.1
    terms-of-service-url:
    contact-name:
    contact-url:
    contact-email:
    license: unlicensed
    license-url:
  security:
    authentication:
      jwt:
        # 此 token 必須使用 Base64 編碼且至少 256 bits 長度
        # 請使用環境變數 JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET 設定
        # 產生方式：openssl rand -base64 64
        # 警告：絕對不要在此處硬編碼實際的密鑰！
        base64-secret: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET}
        # Token is valid 24 hours
        #        token-validity-in-seconds: 3600
        token-validity-in-seconds: 1200
        token-validity-in-seconds-for-remember-me: 2592000
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    org.hibernate.SQL: INFO
    gov.moda.dw.manager: INFO

# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

# Mail參數
# Apple Store圖片
appleStoreImgPath: ${APPLE_STORE_IMG_PATH:img/appleStore.png}
# Google Play圖片
googlePlayImgPath: ${GOOGLE_PLAY_IMG_PATH:img/googlePlay.png}
# 預設 LOGO 圖片
defaultLogoImgPath: ${DEFAULT_LOGO_IMG_PATH:img/defaultLogo.png}
# 組織預設 LOGO 圖片
defaultLogoSmallImgPath: ${DEFAULT_LOGO_SMALL_IMG_PATH:img/defaultLogo_small.png}
# OTP 有效時間(秒)
otpExpireTime: ${OTP_EXPIRE_TIME:300}
# OTP 重發時間(秒)
otpReSendTime: ${OTP_RE_SEND_TIME:60}
# APP 更新日期
appDownloadDate: ${APP_DOWNLOAD_DATE:2025/12/05}

# application:
app.base.path: /api

api:
  version: ${API_VERSION:1.0.13}

# 排程開關
custom:
  schedule:
    sendInformEmail: false
    syncRevokedVcItemDataSwitch: true
    syncRevokedVcItemDataCron: 0 0/30 * * * ?
  job:
    cleanVCDataContent: true
    enableJobWork: true
    removeNotActivatedUsers: true
  liquibase:
    loadType: Issuer # Issuer / Verifier / Issuer,Verifier

# RSA 金鑰對設定
# 警告：絕對不要在此處硬編碼實際的私鑰！
# 請使用環境變數設定：
# - FIN_RSAUTIL_PRVKY: RSA 私鑰（Base64 編碼）
# - FIN_RSAUTIL_PKY: RSA 公鑰（Base64 編碼）
fin.rsaUtil.prvKy: ${FIN_RSAUTIL_PRVKY}
fin.rsaUtil.pky: ${FIN_RSAUTIL_PKY}

# TrackService
gov.moda.dw.manager.company.id: moda

# 沙盒系統API介接
remote-url:
  # VC 服務內部 URL（可透過環境變數 REMOTE_URL_ISSUER_VC 覆寫）
  issuer-vc: ${vc.internal.url}
  # 操作手冊 PDF 連結（可透過環境變數 REMOTE_URL_OPERATION_MANUAL 覆寫）
  operation-manual: ${REMOTE_URL_OPERATION_MANUAL:https://wallet.gov.tw/apply/docs/twdiw_issuermgr_mannual.pdf}

# application:
sandbox:
  privileged-account: issuer_admin
  commonAccountOrgId: '00000000'
  vc-501-901-restrict-enable: false
vcdata-qrcode-alive-time-min: 10
# Metadata Schema 設定（可透過環境變數覆寫）
metadata-schema:
  # 憑證發行者元資料端點（可透過環境變數 METADATA_SCHEMA_CREDENTIAL_ISSUER 覆寫）
  credential-issuer: ${METADATA_SCHEMA_CREDENTIAL_ISSUER:https://${issuer.host.name}/oid4vci/api/issuer/}
  # 憑證端點元資料（可透過環境變數 METADATA_SCHEMA_CREDENTIAL_ENDPOINT 覆寫）
  credential-endpoint: ${METADATA_SCHEMA_CREDENTIAL_ENDPOINT:https://${issuer.host.name}/oid4vci/api/issuer/}
dwfront:
  dwfront-104i: ${dwfront.url}/api/schema
  dwfront-301i: ${dwfront.url}/api/did
issuer:
  host:
    # 發行端 HOST name（可透過環境變數 ISSUER_HOST_NAME 覆寫）
    name: ${ISSUER_HOST_NAME:localhost:8080}
  # 內部 API 端點設定（可透過對應環境變數覆寫）
  # VC 服務 501i API - 設定資料
  dwissuer-vc-501i: ${vc.internal.url}/api/setdata
  # OID4VCI 服務 101i API
  dwissuer-oid4vci-101i: ${oid4vci.internal.url}/api/issuer
  # VC 服務 502i API - 設定序號
  dwissuer-vc-502i: ${vc.internal.url}/api/setseq
  # VC 服務 503i API - 刪除序號
  dwissuer-vc-503i: ${vc.internal.url}/api/delseq
  # VC 服務 504i API - 功能開關
  dwissuer-vc-504i: ${vc.internal.url}/api/funcswitch
  # VC 服務 402i API - Nonce 管理
  dwissuer-vc-402i: ${vc.internal.url}/api/credential/nonce
  # VC 服務 101i API - DID 管理
  dwissuer-vc-101i: ${vc.internal.url}/api/did
  # OID4VCI 服務 URI
  oidvci-uri: ${oid4vci.internal.url}
  security:
    authentication:
      jwt:
        # 警告：絕對不要在此處硬編碼實際的私鑰和公鑰！
        # 請使用環境變數設定：
        # - ISSUER_SECURITY_AUTHENTICATION_JWT_PRIVATE_KEY: JWT 簽署私鑰（PEM 格式）
        # - ISSUER_SECURITY_AUTHENTICATION_JWT_PUBLIC_KEY: JWT 簽署公鑰（PEM 格式）
        private-key: ${ISSUER_SECURITY_AUTHENTICATION_JWT_PRIVATE_KEY}
        public-key: ${ISSUER_SECURITY_AUTHENTICATION_JWT_PUBLIC_KEY}
attributeencryptor:
  # 屬性加密金鑰設定（必填，256-bit / 24 bytes，Base64 編碼）
  # 警告：絕對不要在此處硬編碼實際的密鑰！
  # 請使用環境變數 ATTRIBUTEENCRYPTOR_KEY 設定
  # 產生方式：openssl rand -base64 24
  key: ${ATTRIBUTEENCRYPTOR_KEY}

# 開關設定
switch:
  verify:
    # OTP 驗證
    otp: ${SWITCH_VERIFY_OTP:false}

# 寄件者資訊
mail:
  from:
    address: ${MAIL_FROM_ADDRESS:}

# 動態 Qr Code 型態，1: 原始 deeplink, 2: Universal/App link
qrcode:
  link:
    type: ${QRCODE_LINK_TYPE:2}

# vc, oid4vci服務內部url
oid4vci:
  internal:
    url: ${OID4VCI_INTERNAL_URL:http://moda-digitalwallet-docker-issuer-oid4vci-service:8080}
vc:
  internal:
    url: ${VC_INTERNAL_URL:http://moda-digitalwallet-docker-issuer-vc-service:8080}

# 日誌檔案路徑
log:
  path: ${LOG_PATH:aplogs}
---
# ===================================================================
# Release 環境專屬配置
# ===================================================================
spring:
  config:
    activate:
      on-profile: release
  liquibase:
    # 在 release 環境載入特定的資料
    contexts: release
  mail:
    # 郵件暱稱設定為正式環境名稱
    nickname: 發行端模組系統

# 沙盒系統API介接 - Release 環境
remote-url:
  # 前端系統網址（正式環境）
  frontend: https://frontend.wallet.gov.tw

# 前端系統相關設定 - Release 環境
dwfront:
  # 前端系統基礎網址，可透過環境變數 DWFRONT_URL 覆寫
  url: ${DWFRONT_URL:https://frontend.wallet.gov.tw}

# IVPAS 驗證服務設定 - Release 環境
ivpas:
  # DID 驗證 API 端點（正式環境）
