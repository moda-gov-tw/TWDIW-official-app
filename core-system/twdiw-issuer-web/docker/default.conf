        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /vc/api/keys {
        proxy_pass http://moda-digitalwallet-docker-issuer-vc-service:8080/api/keys;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /vc/api/logo/ {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/api/logo/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location ~ ^/oid4vci/api/issuer/[^/]+/credential-offer-object$ {
        rewrite ^/oid4vci(/api/issuer/[^/]+/credential-offer-object)$ $1 break;
        proxy_pass http://moda-digitalwallet-docker-issuer-oid4vci-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location ~ ^/oid4vci/api/issuer/[^/]+/.well-known/openid-credential-issuer$ {
        rewrite ^/oid4vci(/api/issuer/[^/]+/.well-known/openid-credential-issuer)$ $1 break;
        proxy_pass http://moda-digitalwallet-docker-issuer-oid4vci-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location ~ ^/oid4vci/api/issuer/[^/]+/token$ {
        rewrite ^/oid4vci(/api/issuer/[^/]+/token)$ $1 break;
        proxy_pass http://moda-digitalwallet-docker-issuer-oid4vci-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
