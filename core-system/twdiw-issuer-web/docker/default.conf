    }

    location ~ ^/oid4vci/api/issuer/[^/]+/credential$ {
        rewrite ^/oid4vci(/api/issuer/[^/]+/credential)$ $1 break;
        proxy_pass http://moda-digitalwallet-docker-issuer-oid4vci-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /oid4vci/api/getVcData {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/api/getVcData;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /oid4vci/api/ext/ {
    proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/api/ext/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    error_page  403             /403.html;
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
