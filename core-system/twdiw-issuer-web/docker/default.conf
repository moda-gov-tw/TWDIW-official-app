server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location /issuermgr/ {
        alias  /usr/share/nginx/html/;
        index  index.html index.htm;
        try_files $uri $uri/ /issuermgr/index.html;
    }

    location /issuermgr/management/info {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/management/info;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /issuermgr/management/health {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/management/health;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /issuermgr/api/ {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /vc/api/images {
        proxy_pass http://moda-digitalwallet-docker-issuer-manager-service:8080/api/images;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /vc/api/status-list {
        proxy_pass http://moda-digitalwallet-docker-issuer-vc-service:8080/api/status-list;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_buffering off;
    }

    location /vc/api/schema {
