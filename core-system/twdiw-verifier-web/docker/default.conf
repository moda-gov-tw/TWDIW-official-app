        proxy_cache off;
        proxy_buffering off;
    }

    location /oid4vp/api/logo/ {
        proxy_pass http://moda-digitalwallet-docker-verifier-manager-service:8080/api/logo/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
